services:
  db:
    image: postgres:17-alpine
    container_name: jual_postgres_db
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-jual_db}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jual_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/gutiere5/jual-inventory-backend:latest
    container_name: jual_inventory_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres_db:5432/${DB_NAME}?schema=public"
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN_URLS}
      JWT_EXPIRES_IN: 1
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    image: ghcr.io/gutiere5/jual-inventory-dashboard:latest
    container_name: jual_inventory_dashboard
    restart: always
    environment:
      VITE_BACKEND_API_URL: ${BACKEND_API_URL:-http://localhost:3000}
      VITE_BACKEND_API_TIMEOUT: 5000
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
