cd version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: jual_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: jual_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:alpine
    container_name: jual_queue
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: